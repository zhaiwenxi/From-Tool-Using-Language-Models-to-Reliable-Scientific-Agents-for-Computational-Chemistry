[project]
authors = ["Jinzhe Zeng <jinzhe.zeng@rutgers.edu>"]
channels = ["conda-forge", "anjos"]
description = "paper template"
name = "paper-template"
platforms = ["linux-64", "osx-arm64"]
version = "0.1.0"

[tasks]
download_bibtex = "rm -f combined.bib && gh run download -R jinzhezenggroup/zenglib -n dist-combined-bib"
compile = { cmd = "tectonic main.tex", depends-on = ["download_bibtex"] }

[dependencies]
tectonic = ">=0.15.0,<0.16"
gh = ">=2.63.2,<3"
biber = { version = "2.17.*", channel = "anjos" }
